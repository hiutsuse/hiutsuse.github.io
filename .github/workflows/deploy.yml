name: Deploy Jekyll site to Pages

on:
  push:
    branches: ["main"] # mainブランチにプッシュされたら動くよ！

# これがないとPagesにアップロードできないから気をつけてね！
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: コードを持ってくるよ！📦
        uses: actions/checkout@v4

      - name: Rubyの準備をするよ！💎
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3' # 使ってるRubyのバージョンに合わせてね！
          bundler-cache: true

      - name: Jekyllで _site を作るよ！🔨
        run: bundle exec jekyll build

      - name: できた _site フォルダをまとめるよ！🎁
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site # ここで _site だけを指定してるのが一番のポイントだよ！

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: GitHub Pagesに公開するよ！🚀
        id: deployment
        uses: actions/deploy-pages@v4